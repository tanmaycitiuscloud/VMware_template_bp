# create-backend-service.yml - Create a backend service with an instance group
---
- name: Create Backend Service
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gcp_project: "my-project-123"
    gcp_cred_kind: "serviceaccount"
    gcp_cred_file: "/opt/ansible/gcp-credentials.json"

  tasks:
    - name: Get health check reference
      google.cloud.gcp_compute_health_check:
        name: "web-health-check"
        type: HTTP
        http_health_check:
          port: 80
          request_path: "/healthz"
        project: "{{ gcp_project }}"
        auth_kind: "{{ gcp_cred_kind }}"
        service_account_file: "{{ gcp_cred_file }}"
        state: present
      register: hc

    - name: Get instance group reference
      google.cloud.gcp_compute_instance_group:
        name: "web-servers-group"
        zone: "us-central1-a"
        project: "{{ gcp_project }}"
        auth_kind: "{{ gcp_cred_kind }}"
        service_account_file: "{{ gcp_cred_file }}"
        state: present
      register: ig

    - name: Create the backend service
      google.cloud.gcp_compute_backend_service:
        name: "web-backend-service"
        health_checks:
          - "{{ hc.selfLink }}"
        backends:
          - group: "{{ ig.selfLink }}"
            balancing_mode: UTILIZATION
            max_utilization: 0.8
            capacity_scaler: 1.0
        port_name: http
        protocol: HTTP
        timeout_sec: 30
        connection_draining:
          draining_timeout_sec: 300
        log_config:
          enable: true
          sample_rate: 1.0
        project: "{{ gcp_project }}"
        auth_kind: "{{ gcp_cred_kind }}"
        service_account_file: "{{ gcp_cred_file }}"
        state: present
      register: backend

    - name: Show backend service
      ansible.builtin.debug:
        msg: "Backend service '{{ backend.name }}' created"
